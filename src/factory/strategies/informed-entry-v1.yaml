name: informed-entry-v1
description: >
  Buy favored token only when exchange confirms direction (moved >0.05% from strike)
  AND the CLOB hasn't repriced yet (token still under maxClobPrice).
  The edge is the lag between exchange movement and CLOB repricing.

signals:
  - type: informed-entry
    params:
      minExchangeDistPct: {sweep: [0.05, 0.10, 0.20]}
      maxClobPrice: {sweep: [0.40, 0.50, 0.60]}
      minExchanges: 3

filters:
  - type: time-window
    params:
      entryWindowMs: 600000
  - type: cooldown
    params:
      cooldownMs: 10000
  - type: once-per-window

sizer:
  type: fixed-capital
  params:
    capitalPerTrade: 2

combine: all-of
